<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CrabNest{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Dark Theme (Default) */
        :root, [data-theme="dark"] {
            --rust-primary: #CE412B;
            --rust-secondary: #F9A825;
            --rust-dark: #1C1C1C;
            --rust-darker: #0D0D0D;
            --rust-light: #F5F5F5;
            --rust-gray: #2D2D2D;
            --rust-orange: #F97316;
            
            /* Theme-specific variables */
            --bg-gradient-start: #0D0D0D;
            --bg-gradient-end: #1C1C1C;
            --text-primary: #F5F5F5;
            --text-secondary: #B0B0B0;
            --text-muted: #CCCCCC;
            --navbar-bg: rgba(28, 28, 28, 0.95);
            --card-bg: rgba(45, 45, 45, 0.8);
            --card-border: rgba(206, 65, 43, 0.3);
            --footer-bg: rgba(13, 13, 13, 0.9);
            --input-bg: rgba(45, 45, 45, 0.8);
            --chat-bg: rgba(13, 13, 13, 0.5);
            --message-bg: rgba(45, 45, 45, 0.8);
            --message-own-bg: rgba(206, 65, 43, 0.3);
            --scrollbar-track: rgba(45, 45, 45, 0.3);
            --room-key-bg: rgba(206, 65, 43, 0.2);
            --nav-link-color: rgba(255, 255, 255, 0.85);
            --step-circle-bg: #1C1C1C;
        }
        
        /* Light Theme */
        [data-theme="light"] {
            --rust-primary: #CE412B;
            --rust-secondary: #F9A825;
            --rust-dark: #1C1C1C;
            --rust-darker: #0D0D0D;
            --rust-light: #F5F5F5;
            --rust-gray: #2D2D2D;
            --rust-orange: #E05E0F;
            
            /* Theme-specific variables */
            --bg-gradient-start: #FFFFFF;
            --bg-gradient-end: #F0F0F0;
            --text-primary: #1C1C1C;
            --text-secondary: #555555;
            --text-muted: #666666;
            --navbar-bg: rgba(255, 255, 255, 0.95);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(206, 65, 43, 0.4);
            --footer-bg: rgba(245, 245, 245, 0.95);
            --input-bg: rgba(255, 255, 255, 0.9);
            --chat-bg: rgba(245, 245, 245, 0.8);
            --message-bg: rgba(240, 240, 240, 0.9);
            --message-own-bg: rgba(206, 65, 43, 0.15);
            --scrollbar-track: rgba(200, 200, 200, 0.5);
            --room-key-bg: rgba(206, 65, 43, 0.1);
            --nav-link-color: #333333;
            --step-circle-bg: #FFFFFF;
        }
        
        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .navbar {
            background: var(--navbar-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--rust-primary);
            transition: background 0.3s ease;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .brand-rust {
            color: var(--rust-primary) !important;
        }
        
        .brand-crab {
            color: var(--rust-orange) !important;
        }
        
        .nav-link {
            color: var(--nav-link-color) !important;
            transition: color 0.3s ease;
        }
        
        .nav-link:hover {
            color: var(--rust-primary) !important;
        }
        
        .btn-rust {
            background: linear-gradient(135deg, var(--rust-primary) 0%, #B83A27 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-rust:hover {
            background: linear-gradient(135deg, #E04E37 0%, var(--rust-primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(206, 65, 43, 0.4);
            color: white;
        }
        
        .btn-rust-outline {
            background: transparent;
            border: 2px solid var(--rust-primary);
            color: var(--rust-primary);
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-rust-outline:hover {
            background: var(--rust-primary);
            color: white;
        }
        
        .card-rust {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .hero-section {
            padding: 100px 0;
            text-align: center;
        }
        
        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .feature-icon {
            font-size: 3rem;
            color: var(--rust-primary);
            margin-bottom: 1rem;
        }
        
        .crab-logo {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .footer {
            background: var(--footer-bg);
            border-top: 1px solid var(--card-border);
            padding: 20px 0;
            margin-top: auto;
            transition: background 0.3s ease;
        }
        
        .glow-text {
            text-shadow: 0 0 20px rgba(206, 65, 43, 0.5);
        }
        
        /* Override Bootstrap text-muted */
        .text-muted {
            color: var(--text-muted) !important;
        }
        
        .card-rust .text-muted {
            color: var(--text-secondary) !important;
        }
        
        /* Card titles */
        .card-rust h4 {
            color: var(--text-primary) !important;
        }
        
        .card-rust h5 {
            color: var(--text-primary) !important;
        }
        
        /* Theme toggle button */
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--rust-primary);
            color: var(--rust-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        
        .theme-toggle:hover {
            background: var(--rust-primary);
            color: white;
            transform: rotate(15deg);
        }
        
        [data-theme="light"] .theme-toggle .bi-moon-fill,
        [data-theme="dark"] .theme-toggle .bi-sun-fill {
            display: none;
        }
        
        [data-theme="light"] .theme-toggle .bi-sun-fill,
        [data-theme="dark"] .theme-toggle .bi-moon-fill {
            display: inline;
        }
        
        /* Chat specific styles */
        .chat-container {
            height: calc(100vh - 250px);
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--chat-bg);
            border-radius: 12px;
            margin-bottom: 15px;
            transition: background 0.3s ease;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-sender {
            font-weight: 600;
            color: var(--rust-orange);
            margin-bottom: 4px;
        }
        
        .message-content {
            background: var(--message-bg);
            padding: 10px 15px;
            border-radius: 12px;
            display: inline-block;
            max-width: 80%;
            word-wrap: break-word;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }
        
        .message-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .message-own .message-content {
            background: var(--message-own-bg);
            margin-left: auto;
        }
        
        .message-own {
            text-align: right;
        }
        
        .message-own .message-sender {
            color: var(--rust-primary);
        }
        
        .message-system {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.9rem;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 12px 20px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: var(--rust-primary);
            box-shadow: 0 0 10px rgba(206, 65, 43, 0.3);
        }
        
        .chat-input::placeholder {
            color: var(--text-secondary);
        }
        
        .username-input {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 8px 15px;
            width: 200px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .username-input:focus {
            outline: none;
            border-color: var(--rust-orange);
        }
        
        .room-info {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }
        
        .room-key {
            font-family: 'Courier New', monospace;
            background: var(--room-key-bg);
            padding: 5px 15px;
            border-radius: 6px;
            color: var(--rust-orange);
        }
        
        .online-indicator {
            width: 10px;
            height: 10px;
            background: #22C55E;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--rust-primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #E04E37;
        }
        
        /* Form controls in light theme */
        [data-theme="light"] .form-control,
        [data-theme="light"] .form-select {
            background-color: var(--input-bg);
            border-color: var(--card-border);
            color: var(--text-primary);
        }
        
        [data-theme="light"] .form-control:focus,
        [data-theme="light"] .form-select:focus {
            background-color: var(--input-bg);
            border-color: var(--rust-primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.25rem rgba(206, 65, 43, 0.25);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-crab">🦀</span>
                <span class="brand-rust">Crab</span><span class="brand-crab">Nest</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/create"><i class="bi bi-plus-circle me-1"></i>Create Room</a>
                    </li>
                    <li class="nav-item ms-2">
                        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                            <i class="bi bi-moon-fill"></i>
                            <i class="bi bi-sun-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <span class="text-muted">
                🦀 CrabNest - Built with <span class="brand-rust">Rust</span> & <span class="text-info">Axum</span>
            </span>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Theme Toggle Script -->
    <script>
        (function() {
            // Get saved theme from localStorage or default to 'dark'
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Theme toggle functionality
            document.addEventListener('DOMContentLoaded', function() {
                const themeToggle = document.getElementById('themeToggle');
                
                if (themeToggle) {
                    themeToggle.addEventListener('click', function() {
                        const currentTheme = document.documentElement.getAttribute('data-theme');
                        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                        
                        document.documentElement.setAttribute('data-theme', newTheme);
                        localStorage.setItem('theme', newTheme);
                    });
                }
            });
        })();
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
