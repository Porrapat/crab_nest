{% extends "base.html" %}

{% block title %}Room {{ room_key }} - CrabNest{% endblock %}

{% block content %}
<main class="py-4" style="min-height: calc(100vh - 120px);">
    <div class="container">
        <!-- Room Info -->
        <div class="room-info d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <h4 class="mb-1">
                    <span class="online-indicator"></span>
                    Room: <span class="room-key">{{ room_key }}</span>
                    <span class="badge bg-success ms-2" id="online-count" title="People online">
                        <i class="bi bi-people-fill me-1"></i><span id="user-count-number">0</span> online
                    </span>
                </h4>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div>
                    <label class="small text-muted me-2">Your Name:</label>
                    <input type="text" class="username-input" id="username" 
                           value="{{ username }}" onchange="updateUsername()">
                </div>
                <button class="btn btn-rust-outline btn-sm" onclick="copyRoomLink()">
                    <i class="bi bi-share me-1"></i>Share
                </button>
            </div>
        </div>
        
        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be loaded here -->
                <div class="text-center text-muted py-5" id="loading-messages">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Loading messages...
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <span class="typing-text" id="typing-text"></span>
                <span class="typing-dots">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </span>
            </div>
            
            <!-- Chat Input -->
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="message-input" 
                       placeholder="Type your message..." 
                       onkeypress="handleKeyPress(event)"
                       oninput="handleTyping()">
                <button class="btn btn-voice" id="voice-btn" 
                        onmousedown="startRecording()" 
                        onmouseup="stopRecording()"
                        ontouchstart="startRecording()"
                        ontouchend="stopRecording()"
                        title="Hold to record voice message">
                    <i class="bi bi-mic-fill" id="voice-icon"></i>
                </button>
                <button class="btn btn-rust" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
            
            <!-- Voice Recording Indicator -->
            <div class="voice-recording-indicator" id="voice-recording-indicator" style="display: none;">
                <div class="recording-pulse"></div>
                <span class="recording-text">Recording... Release to send</span>
                <span class="recording-time" id="recording-time">00:00</span>
            </div>
        </div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>
    const ROOM_KEY = '{{ room_key }}';
    let ws;
    let username = document.getElementById('username').value;
    
    // Heartbeat configuration
    const HEARTBEAT_INTERVAL = 25000; // Send ping every 25 seconds
    const HEARTBEAT_TIMEOUT = 35000;  // Consider connection dead if no pong in 35 seconds
    let heartbeatTimer = null;
    let heartbeatTimeoutTimer = null;
    let lastPongTime = Date.now();
    let isConnected = false;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_DELAY = 30000; // Max 30 seconds between reconnect attempts
    
    // Typing indicator configuration
    const TYPING_DEBOUNCE_DELAY = 300; // Debounce delay for typing events
    const TYPING_TIMEOUT = 3000; // Clear typing status after 3 seconds of inactivity
    let typingTimer = null;
    let isTyping = false;
    let typingUsers = new Map(); // Map of username -> timeout ID
    
    // Update connection status indicator
    function updateConnectionStatus(connected) {
        isConnected = connected;
        const indicator = document.querySelector('.online-indicator');
        if (indicator) {
            indicator.style.backgroundColor = connected ? '#28a745' : '#dc3545';
            indicator.title = connected ? 'Connected' : 'Disconnected - Reconnecting...';
        }
    }
    
    // Start heartbeat
    function startHeartbeat() {
        stopHeartbeat();
        lastPongTime = Date.now();
        
        // Send periodic pings
        heartbeatTimer = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const timestamp = Date.now();
                ws.send(JSON.stringify({
                    type: 'ping',
                    timestamp: timestamp
                }));
                console.log('Sent heartbeat ping:', timestamp);
                
                // Check if we've received a pong recently
                const timeSinceLastPong = Date.now() - lastPongTime;
                if (timeSinceLastPong > HEARTBEAT_TIMEOUT) {
                    console.warn('Heartbeat timeout - no pong received in', timeSinceLastPong, 'ms');
                    handleConnectionLost();
                }
            }
        }, HEARTBEAT_INTERVAL);
    }
    
    // Stop heartbeat
    function stopHeartbeat() {
        if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;
        }
        if (heartbeatTimeoutTimer) {
            clearTimeout(heartbeatTimeoutTimer);
            heartbeatTimeoutTimer = null;
        }
    }
    
    // Handle connection lost
    function handleConnectionLost() {
        stopHeartbeat();
        updateConnectionStatus(false);
        if (ws) {
            ws.close();
        }
    }
    
    // Calculate reconnect delay with exponential backoff
    function getReconnectDelay() {
        const baseDelay = 1000;
        const delay = Math.min(baseDelay * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
        return delay;
    }
    
    // Initialize WebSocket connection
    function initWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/${ROOM_KEY}`;
        
        updateConnectionStatus(false);
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = function() {
            console.log('Connected to chat room');
            reconnectAttempts = 0;
            updateConnectionStatus(true);
            startHeartbeat();
            
            // Send join message
            ws.send(JSON.stringify({
                type: 'join',
                username: username
            }));
        };
        
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Handle pong response
            if (data.type === 'pong') {
                lastPongTime = Date.now();
                console.log('Received heartbeat pong:', data.timestamp);
                return;
            }
            
            // Handle ping from server (respond with pong)
            if (data.type === 'ping') {
                ws.send(JSON.stringify({
                    type: 'pong',
                    timestamp: data.timestamp
                }));
                lastPongTime = Date.now();
                return;
            }
            
            // Handle user count update
            if (data.type === 'user_count') {
                updateOnlineCount(data.count);
                return;
            }
            
            // Handle typing indicator
            if (data.type === 'typing') {
                handleTypingEvent(data);
                return;
            }
            
            displayMessage(data);
        };
        
        ws.onclose = function(event) {
            console.log('Disconnected from chat room. Code:', event.code, 'Reason:', event.reason);
            stopHeartbeat();
            updateConnectionStatus(false);
            
            // Reconnect with exponential backoff
            reconnectAttempts++;
            const delay = getReconnectDelay();
            console.log(`Attempting to reconnect in ${delay}ms (attempt ${reconnectAttempts})`);
            setTimeout(initWebSocket, delay);
        };
        
        ws.onerror = function(error) {
            console.error('WebSocket error:', error);
            updateConnectionStatus(false);
        };
    }
    
    // Load existing messages
    async function loadMessages() {
        try {
            const response = await fetch(`/api/rooms/${ROOM_KEY}/messages`);
            if (response.ok) {
                const messages = await response.json();
                document.getElementById('loading-messages').style.display = 'none';
                messages.forEach(msg => {
                    if (msg.message_type === 'voice' && msg.voice_path) {
                        displayMessage({
                            type: 'voice',
                            sender_name: msg.sender_name,
                            voice_url: msg.voice_path,
                            created_at: msg.created_at
                        }, false);
                    } else {
                        displayMessage({
                            type: 'chat',
                            sender_name: msg.sender_name,
                            content: msg.content,
                            message_type: msg.message_type || 'text',
                            created_at: msg.created_at
                        }, false);
                    }
                });
                scrollToBottom();
            }
        } catch (error) {
            console.error('Failed to load messages:', error);
            document.getElementById('loading-messages').innerHTML = 
                '<i class="bi bi-exclamation-circle me-2"></i>Failed to load messages';
        }
    }
    
    // Display a message in the chat
    function displayMessage(data, scroll = true) {
        const messagesContainer = document.getElementById('chat-messages');
        const loadingDiv = document.getElementById('loading-messages');
        if (loadingDiv) loadingDiv.style.display = 'none';
        
        const messageDiv = document.createElement('div');
        
        if (data.type === 'system') {
            messageDiv.className = 'message message-system';
            messageDiv.innerHTML = `<small>${data.message}</small>`;
        } else if (data.type === 'voice') {
            const isOwn = data.sender_name === username;
            messageDiv.className = `message message-voice ${isOwn ? 'message-own' : ''}`;
            
            const timestamp = data.created_at && !data.created_at.endsWith('Z') ? data.created_at + 'Z' : data.created_at;
            const date = timestamp ? new Date(timestamp) : new Date();
            const time = formatTime(date);
            const uniqueId = 'voice-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            
            messageDiv.innerHTML = `
                <div class="message-sender">${escapeHtml(data.sender_name)}</div>
                <div class="voice-message-content">
                    <button class="voice-play-btn" onclick="toggleVoicePlay('${uniqueId}', '${data.voice_url}')">
                        <i class="bi bi-play-fill" id="${uniqueId}-icon"></i>
                    </button>
                    <div class="voice-waveform">
                        <div class="voice-progress" id="${uniqueId}-progress"></div>
                    </div>
                    <span class="voice-duration" id="${uniqueId}-duration">--:--</span>
                    <audio id="${uniqueId}" src="${data.voice_url}" preload="metadata"
                           onloadedmetadata="updateVoiceDuration('${uniqueId}')"
                           ontimeupdate="updateVoiceProgress('${uniqueId}')"
                           onended="resetVoicePlayer('${uniqueId}')"></audio>
                </div>
                <div class="message-time">${time}</div>
            `;
        } else if (data.type === 'chat') {
            const isOwn = data.sender_name === username;
            messageDiv.className = `message ${isOwn ? 'message-own' : ''}`;
            
            // Append 'Z' to indicate UTC if the timestamp doesn't have timezone info
            const timestamp = data.created_at && !data.created_at.endsWith('Z') ? data.created_at + 'Z' : data.created_at;
            const date = timestamp ? new Date(timestamp) : new Date();
            const time = formatTime(date);
            
            messageDiv.innerHTML = `
                <div class="message-sender">${escapeHtml(data.sender_name)}</div>
                <div class="message-content">${escapeHtml(data.content)}</div>
                <div class="message-time">${time}</div>
            `;
        }
        
        messagesContainer.appendChild(messageDiv);
        if (scroll) scrollToBottom();
    }
    
    // Send a message
    function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        
        if (content && ws && ws.readyState === WebSocket.OPEN) {
            // Stop typing indicator when message is sent
            if (isTyping) {
                isTyping = false;
                sendTypingStatus(false);
            }
            if (typingTimer) {
                clearTimeout(typingTimer);
                typingTimer = null;
            }
            
            ws.send(JSON.stringify({
                type: 'chat',
                sender_name: username,
                content: content,
                created_at: new Date().toISOString()
            }));
            input.value = '';
        }
    }
    
    // Handle Enter key press
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
    
    // Update username
    function updateUsername() {
        const oldUsername = username;
        username = document.getElementById('username').value.trim() || '{{ username }}';
        document.getElementById('username').value = username;
    }
    
    // Copy room link
    function copyRoomLink() {
        const link = window.location.href;
        navigator.clipboard.writeText(link).then(() => {
            alert('Room link copied to clipboard!');
        });
    }
    
    // Scroll to bottom of messages
    function scrollToBottom() {
        const container = document.getElementById('chat-messages');
        container.scrollTop = container.scrollHeight;
    }
    
    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Update online user count display
    function updateOnlineCount(count) {
        const countElement = document.getElementById('user-count-number');
        if (countElement) {
            countElement.textContent = count;
        }
        console.log('Online users:', count);
    }
    
    // Handle typing input - send typing indicator with debounce
    function handleTyping() {
        const input = document.getElementById('message-input');
        const hasContent = input.value.trim().length > 0;
        
        // Clear existing typing timer
        if (typingTimer) {
            clearTimeout(typingTimer);
        }
        
        // Send typing start if not already typing and has content
        if (!isTyping && hasContent) {
            isTyping = true;
            sendTypingStatus(true);
        }
        
        // Set timer to stop typing after inactivity
        if (hasContent) {
            typingTimer = setTimeout(() => {
                if (isTyping) {
                    isTyping = false;
                    sendTypingStatus(false);
                }
            }, TYPING_TIMEOUT);
        } else {
            // If input is empty, stop typing immediately
            if (isTyping) {
                isTyping = false;
                sendTypingStatus(false);
            }
        }
    }
    
    // Send typing status to server
    function sendTypingStatus(typing) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'typing',
                username: username,
                is_typing: typing
            }));
        }
    }
    
    // Handle received typing event from other users
    function handleTypingEvent(data) {
        // Ignore own typing events
        if (data.username === username) {
            return;
        }
        
        // Clear existing timeout for this user
        if (typingUsers.has(data.username)) {
            clearTimeout(typingUsers.get(data.username));
            typingUsers.delete(data.username);
        }
        
        if (data.is_typing) {
            // Add user to typing list with auto-clear timeout
            const timeoutId = setTimeout(() => {
                typingUsers.delete(data.username);
                updateTypingIndicator();
            }, TYPING_TIMEOUT + 1000); // Extra buffer for network latency
            
            typingUsers.set(data.username, timeoutId);
        }
        
        updateTypingIndicator();
    }
    
    // Update typing indicator display
    function updateTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        const textElement = document.getElementById('typing-text');
        
        const typingUsernames = Array.from(typingUsers.keys());
        
        if (typingUsernames.length === 0) {
            indicator.style.display = 'none';
        } else {
            indicator.style.display = 'flex';
            
            if (typingUsernames.length === 1) {
                textElement.textContent = `${typingUsernames[0]} is typing`;
            } else if (typingUsernames.length === 2) {
                textElement.textContent = `${typingUsernames[0]} and ${typingUsernames[1]} are typing`;
            } else {
                textElement.textContent = `${typingUsernames.length} people are typing`;
            }
        }
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadMessages();
        initWebSocket();
    });
    
    // Handle page unload
    window.addEventListener('beforeunload', function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'leave',
                username: username
            }));
        }
    });
    
    // Format time helper
    function formatTime(date) {
        return date.getUTCFullYear() + '-' + 
            String(date.getUTCMonth() + 1).padStart(2, '0') + '-' + 
            String(date.getUTCDate()).padStart(2, '0') + ' ' + 
            String(date.getUTCHours()).padStart(2, '0') + ':' + 
            String(date.getUTCMinutes()).padStart(2, '0') + ':' + 
            String(date.getUTCSeconds()).padStart(2, '0');
    }
    
    // ========== Voice Recording Functions ==========
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let recordingStartTime = null;
    let recordingTimer = null;
    const MAX_RECORDING_TIME = 30000; // 30 seconds max
    
    // Check if browser supports audio recording
    function checkMediaRecorderSupport() {
        return navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder;
    }
    
    // Start recording
    async function startRecording() {
        if (!checkMediaRecorderSupport()) {
            alert('Your browser does not support audio recording.');
            return;
        }
        
        if (isRecording) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Determine the best supported format
            let mimeType = 'audio/webm';
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                mimeType = 'audio/webm;codecs=opus';
            } else if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
                mimeType = 'audio/ogg;codecs=opus';
            } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                mimeType = 'audio/mp4';
            }
            
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = async () => {
                // Stop all tracks
                stream.getTracks().forEach(track => track.stop());
                
                // Only send if we have audio data and recording wasn't cancelled
                if (audioChunks.length > 0 && isRecording) {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    await uploadVoiceMessage(audioBlob);
                }
                
                isRecording = false;
                hideRecordingIndicator();
            };
            
            mediaRecorder.start(100); // Collect data every 100ms
            isRecording = true;
            recordingStartTime = Date.now();
            
            showRecordingIndicator();
            startRecordingTimer();
            
            // Auto-stop after max recording time
            setTimeout(() => {
                if (isRecording) {
                    stopRecording();
                }
            }, MAX_RECORDING_TIME);
            
        } catch (error) {
            console.error('Failed to start recording:', error);
            if (error.name === 'NotAllowedError') {
                alert('Microphone access was denied. Please allow microphone access to record voice messages.');
            } else {
                alert('Failed to start recording: ' + error.message);
            }
        }
    }
    
    // Stop recording
    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            stopRecordingTimer();
        }
    }
    
    // Upload voice message to server
    async function uploadVoiceMessage(audioBlob) {
        const formData = new FormData();
        formData.append('sender_name', username);
        formData.append('audio', audioBlob, 'voice.webm');
        
        try {
            const response = await fetch(`/api/rooms/${ROOM_KEY}/voice`, {
                method: 'POST',
                body: formData
            });
            
            if (!response.ok) {
                const error = await response.text();
                console.error('Failed to upload voice message:', error);
                alert('Failed to send voice message: ' + error);
            }
        } catch (error) {
            console.error('Failed to upload voice message:', error);
            alert('Failed to send voice message: ' + error.message);
        }
    }
    
    // Show recording indicator
    function showRecordingIndicator() {
        const indicator = document.getElementById('voice-recording-indicator');
        const voiceBtn = document.getElementById('voice-btn');
        const voiceIcon = document.getElementById('voice-icon');
        
        indicator.style.display = 'flex';
        voiceBtn.classList.add('recording');
        voiceIcon.className = 'bi bi-stop-circle-fill';
    }
    
    // Hide recording indicator
    function hideRecordingIndicator() {
        const indicator = document.getElementById('voice-recording-indicator');
        const voiceBtn = document.getElementById('voice-btn');
        const voiceIcon = document.getElementById('voice-icon');
        
        indicator.style.display = 'none';
        voiceBtn.classList.remove('recording');
        voiceIcon.className = 'bi bi-mic-fill';
    }
    
    // Start recording timer display
    function startRecordingTimer() {
        const timeDisplay = document.getElementById('recording-time');
        recordingTimer = setInterval(() => {
            const elapsed = Date.now() - recordingStartTime;
            const seconds = Math.floor(elapsed / 1000);
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timeDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }, 100);
    }
    
    // Stop recording timer
    function stopRecordingTimer() {
        if (recordingTimer) {
            clearInterval(recordingTimer);
            recordingTimer = null;
        }
    }
    
    // ========== Voice Playback Functions ==========
    let currentlyPlaying = null;
    
    function toggleVoicePlay(audioId, voiceUrl) {
        const audio = document.getElementById(audioId);
        const icon = document.getElementById(audioId + '-icon');
        
        if (!audio) return;
        
        // Pause any currently playing audio
        if (currentlyPlaying && currentlyPlaying !== audioId) {
            const prevAudio = document.getElementById(currentlyPlaying);
            const prevIcon = document.getElementById(currentlyPlaying + '-icon');
            if (prevAudio) {
                prevAudio.pause();
                prevAudio.currentTime = 0;
            }
            if (prevIcon) {
                prevIcon.className = 'bi bi-play-fill';
            }
        }
        
        if (audio.paused) {
            audio.play();
            icon.className = 'bi bi-pause-fill';
            currentlyPlaying = audioId;
        } else {
            audio.pause();
            icon.className = 'bi bi-play-fill';
            currentlyPlaying = null;
        }
    }
    
    function updateVoiceDuration(audioId) {
        const audio = document.getElementById(audioId);
        const durationEl = document.getElementById(audioId + '-duration');
        
        if (audio && durationEl && audio.duration && isFinite(audio.duration)) {
            const duration = Math.floor(audio.duration);
            const minutes = Math.floor(duration / 60);
            const seconds = duration % 60;
            durationEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
    }
    
    function updateVoiceProgress(audioId) {
        const audio = document.getElementById(audioId);
        const progressEl = document.getElementById(audioId + '-progress');
        
        if (audio && progressEl && audio.duration) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressEl.style.width = progress + '%';
        }
    }
    
    function resetVoicePlayer(audioId) {
        const audio = document.getElementById(audioId);
        const icon = document.getElementById(audioId + '-icon');
        const progressEl = document.getElementById(audioId + '-progress');
        
        if (icon) icon.className = 'bi bi-play-fill';
        if (progressEl) progressEl.style.width = '0%';
        if (audio) audio.currentTime = 0;
        currentlyPlaying = null;
    }
</script>
{% endblock %}
